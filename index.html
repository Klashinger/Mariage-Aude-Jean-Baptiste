```html
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mariage</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486') no-repeat center center/cover;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.overlay {
  background: rgba(255, 255, 255, 0.85);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  max-width: 90%;
  width: 400px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h1 {
  margin-bottom: 10px;
}

p {
  margin: 10px 0;
}

.iban {
  font-weight: bold;
  font-size: 18px;
  margin: 15px 0;
  word-break: break-all;
}

button {
  padding: 12px 20px;
  border: none;
  background: #e07a5f;
  color: white;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #d45d3f;
}

@media (max-width: 600px) {
  .overlay {
    padding: 20px;
  }
}
</style>

</head>

<body>

<div class="overlay">
  <h1>💍 Prénom & Prénom</h1>

  <p>Bienvenue à notre mariage 💛</p>

  <p>Votre présence est notre plus beau cadeau ✨</p>

  <p>Si vous souhaitez participer à notre voyage de noces :</p>

  <div class="iban" id="iban">
    FR76 XXXX XXXX XXXX XXXX
  </div>

  <button onclick="copyIBAN()">📋 Copier l'IBAN</button>

  <p id="message" style="color: green; display: none;">IBAN copié ✅</p>
</div>

<script>
function copyIBAN() {
  const text = document.getElementById("iban").innerText;
  navigator.clipboard.writeText(text);
  document.getElementById("message").style.display = "block";
}
</script>

</body>
</html>
